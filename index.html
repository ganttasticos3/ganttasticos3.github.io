<!doctype html>
<html lang="es" class="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width" />

    <title>Notificaciones Push</title>

    <meta name="theme-color" content="#fffbfe" />
    <link rel="icon" sizes="32x32" href="favicon.ico" />
    <link rel="manifest" href="site.webmanifest" />

    <script type="module" src="js/lib/registraServiceWorker.js"></script>
    <script type="module" src="js/lib/manejaErrores.js"></script>

    <script src="ungap/custom-elements.js"></script>

    <script type="module" src="js/lib/custom/md-app-bar.js"></script>
    <script type="module" src="js/nav-tab-fixed.js"></script>

    <link rel="stylesheet" href="css/estilos.css" />
    <link rel="stylesheet" href="css/transicion_pestanas.css" />
    <link rel="stylesheet" href="css/md-tab.css" />
    <link rel="stylesheet" href="css/material-symbols-outlined.css" />
    <link rel="stylesheet" href="css/md-filled-text-field.css" />
    <link rel="stylesheet" href="css/md-filled-button.css" />
    <link rel="stylesheet" href="css/md-outline-button.css" />
  </head>

  <body>
    <md-app-bar adicional="tab" class="centered">
      <h1>Notificaciones Push</h1>
    </md-app-bar>

    <nav-tab-fixed id="tab"></nav-tab-fixed>

    <section style="padding: 20px">
      <menu
        style="
          display: flex;
          gap: 10px;
          flex-wrap: wrap;
          list-style: none;
          padding: 0;
        "
      >
        <li>
          <button id="btnSuscribe" class="md-filled-button" hidden>
            Suscribirse
          </button>
        </li>

        <li>
          <button id="btnCancela" class="md-outline-button" hidden>
            Cancelar suscripción
          </button>
        </li>

        <label
          id="campoMensaje"
          class="md-filled-text-field"
          style="width: 100%; margin-bottom: 10px"
          hidden
        >
          <input id="txtMensaje" type="text" placeholder=" " />
          <span>Mensaje para todos 💬</span>
        </label>

        <li>
          <button id="btnNotifica" class="md-filled-button" hidden>
            Enviar notificación
          </button>
        </li>
      </menu>

      <p>
        <output id="outEstado">
          <progress max="100">Cargando…</progress>
        </output>
      </p>

      <fieldset>
        <legend>Reporte de envío</legend>
        <dl id="reporte"></dl>
      </fieldset>
    </section>

    <script type="module">
      import { activaNotificacionesPush } from "./js/lib/activaNotificacionesPush.js";
      import { getSuscripcionPush } from "./js/lib/getSuscripcionPush.js";
      import { suscribeAPush } from "./js/lib/suscribeAPush.js";
      import { cancelaSuscripcionPush } from "./js/lib/cancelaSuscripcionPush.js";
      import { urlBase64ToUint8Array } from "./js/lib/urlBase64ToUint8Array.js";
      import { calculaDtoParaSuscripcion } from "./js/lib/calculaDtoParaSuscripcion.js";
      import { consume } from "./js/lib/consume.js";
      import { enviaJsonRecibeJson } from "./js/lib/enviaJsonRecibeJson.js";
      import { muestraError } from "./js/lib/muestraError.js";

      // 👇 ESTA URL ES LA QUE HACE QUE EL PHP FUNCIONE (Apuntando a Render)
      const URL_SERVIDOR = "https://ganttasticos3-github-io.onrender.com";

      const applicationServerKey = urlBase64ToUint8Array(
        "BH3P1bFUPWjLhduRYdyax-ar70d_Rpn_plxlnKVwfOlGMX0apZlwMzZSyGGQkaGLfw7DFCGZH7akBfyYkMpw1t4",
      );

      const Estado = {
        CALCULANDO: "Calculando…",
        SUSCRITO: "Suscrito",
        DESUSCRITO: "Sin suscripción",
        INCOMPATIBLE: "Incompatible",
      };

      preparaVista();

      btnSuscribe.addEventListener("click", suscribe);
      btnCancela.addEventListener("click", cancela);
      btnNotifica.addEventListener("click", notificaDesdeElServidor);

      async function preparaVista() {
        try {
          await activaNotificacionesPush("sw.js");

          const suscripcion = await getSuscripcionPush();

          if (suscripcion === null) {
            muestraEstado(Estado.DESUSCRITO);
          } else {
            const dto = calculaDtoParaSuscripcion(suscripcion);

            // Se cambia la ruta para que apunte a Render
            await consume(
              enviaJsonRecibeJson(`${URL_SERVIDOR}/php/suscripcion-modifica.php`, dto),
            );

            muestraEstado(Estado.SUSCRITO);
          }
        } catch (error) {
          muestraEstado(Estado.INCOMPATIBLE);
          muestraError(error);
        }
      }

      async function notificaDesdeElServidor() {
        const mensaje = document.getElementById("txtMensaje").value;

        if (!mensaje) {
          alert("Escribe un mensaje para enviar a los suscriptores");
          return;
        }

        reporte.innerHTML = `<progress max="100">Cargando…</progress>`;

        try {
            // Se cambia fetch para que apunte a Render
            const resp = await fetch(`${URL_SERVIDOR}/php/notifica.php`, {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({ mensaje }),
            });

            const json = await resp.json();
            reporte.innerHTML = json.reporte || "Notificación enviada con éxito.";
        } catch (e) {
            muestraError(e);
            reporte.innerHTML = "Error al conectar con el servidor de Render.";
        }
      }

      async function suscribe() {
        muestraEstado(Estado.CALCULANDO);
        try {
            const suscripcion = await suscribeAPush(applicationServerKey);
            const dto = calculaDtoParaSuscripcion(suscripcion);

            // Se cambia la ruta para que apunte a Render
            await consume(enviaJsonRecibeJson(`${URL_SERVIDOR}/php/suscripcion-modifica.php`, dto));

            muestraEstado(Estado.SUSCRITO);
        } catch (e) {
            muestraError(e);
            muestraEstado(Estado.DESUSCRITO);
        }
      }

      async function cancela() {
        muestraEstado(Estado.CALCULANDO);

        const suscripcion = await cancelaSuscripcionPush();

        if (suscripcion !== null) {
          const dto = calculaDtoParaSuscripcion(suscripcion);

          // Se cambia la ruta para que apunte a Render
          await consume(
            enviaJsonRecibeJson(`${URL_SERVIDOR}/php/suscripcion-elimina.php`, dto),
          );

          muestraEstado(Estado.DESUSCRITO);
        }
      }

      function muestraEstado(estado) {
        outEstado.value = estado;

        const campoMensaje = document.getElementById("campoMensaje");

        if (estado === Estado.INCOMPATIBLE || estado === Estado.CALCULANDO) {
          btnSuscribe.hidden = true;
          btnCancela.hidden = true;
          btnNotifica.hidden = true;
          campoMensaje.hidden = true;
        } else if (estado === Estado.SUSCRITO) {
          btnSuscribe.hidden = true;
          btnCancela.hidden = false;
          btnNotifica.hidden = false;
          campoMensaje.hidden = false;
        } else if (estado === Estado.DESUSCRITO) {
          btnSuscribe.hidden = false;
          btnCancela.hidden = true;
          btnNotifica.hidden = true;
          campoMensaje.hidden = true;
        }
      }
    </script>
  </body>
</html>
